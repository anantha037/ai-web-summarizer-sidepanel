<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Web Summarizer</title>
  <!-- Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Link Local CSS stylesheet -->
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header-container">
      <div class="header-brand">
        <!-- Sparkles icon -->
        <svg class="icon icon-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
        </svg>
        <span class="brand-title">AI Web Summarizer</span>
      </div>
      <span class="version-badge">v1.0</span>
    </div>

    <!-- AI Engine & Keys Section -->
    <div class="card">
      <div class="card-header">
        <label for="engineSelect" class="card-label">Active AI Engine</label>
      </div>
      <div class="input-row">
        <select id="engineSelect" class="input-text">
          <option value="gemini">Gemini 2.5 Flash</option>
          <option value="groq">Groq Llama 3 (8B)</option>
        </select>
      </div>

      <!-- Gemini Key Section -->
      <div class="key-field-group">
        <div class="card-header">
          <label for="apiKey" class="card-label">Gemini API Key</label>
          <span id="keyStatus" class="status-badge">
            <span class="status-dot"></span>Not Saved
          </span>
        </div>
        <div class="input-row">
          <input 
            type="password" 
            id="apiKey" 
            placeholder="Enter Gemini API key..." 
            class="input-text"
          />
          <button id="saveKeyBtn" class="btn-save">Save</button>
        </div>
      </div>

      <!-- Groq Key Section -->
      <div class="key-field-group">
        <div class="card-header">
          <label for="groqApiKey" class="card-label">Groq API Key</label>
          <span id="groqKeyStatus" class="status-badge">
            <span class="status-dot"></span>Not Saved
          </span>
        </div>
        <div class="input-row">
          <input 
            type="password" 
            id="groqApiKey" 
            placeholder="Enter Groq API key..." 
            class="input-text"
          />
          <button id="saveGroqKeyBtn" class="btn-save">Save</button>
        </div>
      </div>
    </div>

    <!-- Summarization Controls -->
    <div class="results-area">
      <div class="input-row">
        <select id="formatSelect" class="input-text" style="flex: 1.2;">
          <option value="standard">Standard Summary</option>
          <option value="bullets">Bullet Points Only</option>
          <option value="eli5">Explain Like I'm 5</option>
        </select>
        <button id="summarizeBtn" class="btn-primary" style="flex: 1.8; width: auto; font-size: 13px;">
          <span>Summarize Page</span>
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </button>
      </div>

      <!-- Loading Spinner (Hidden by default) -->
      <div id="loadingContainer" class="loader-container hidden">
        <div class="spinner">
          <div class="spinner-track"></div>
          <div class="spinner-ring"></div>
        </div>
        <p class="loader-text">Extracting & Summarizing page content...</p>
      </div>

      <!-- Result Container (Hidden by default) -->
      <div id="resultContainer" class="results-area hidden">
        <div class="results-header">
          <span class="card-label">Summary</span>
          <button id="copyBtn" class="btn-copy">
            <svg class="icon icon-xs" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 002-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
            </svg>
            <span>Copy</span>
          </button>
        </div>
        <div id="summaryText" class="summary-box select-text">
          <!-- Summary output will appear here -->
        </div>

        <!-- Q&A Section -->
        <div class="qa-section">
          <div class="qa-header">
            <svg class="icon icon-xs icon-indigo" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
            <span class="card-label">Ask follow-up questions</span>
          </div>
          
          <!-- Chat History Panel (initially hidden, dynamically shown) -->
          <div id="chatHistory" class="chat-history hidden">
            <!-- Messages injected programmatically -->
          </div>

          <!-- Input Panel -->
          <div class="chat-input-row">
            <input 
              type="text" 
              id="chatInput" 
              placeholder="Ask anything about the page content..." 
              class="chat-input"
            />
            <button id="sendChatBtn" class="btn-send">
              <svg class="icon icon-xs icon-rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
